name: Refresh AA meetings

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npm run refresh:data

      - name: Commit refreshed dataset
        run: |
          if git diff --quiet apps/api/data/meetings.json; then
            echo "No dataset changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/data/meetings.json
          git commit -m "chore: refresh AA meetings dataset"
          git push
